{% extends 'base.html' %}
{% load static %}

{% block title %}Register - Glowify{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="auth-container">
    <div class="auth-left">
        <img src="{% static 'images/login.png' %}" alt="Glowify">
    </div>
    
    <div class="auth-right">
        <div class="auth-box">
            <h2>Create Account</h2>
            
            <form id="register-form" method="POST" action="{% url 'register' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" placeholder="e.g Narmatha" required>
                </div>
                
                <div class="form-group">
                    <label>Email Id</label>
                    <input type="email" name="email" placeholder="nar@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="reg-password" placeholder="Enter Password" required>
                        <span class="toggle-password" onclick="togglePassword('reg-password')">👁</span>
                    </div>
                </div>
                
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                
                <button type="submit" class="auth-btn">Register</button>
                
                <p class="switch-auth">Already have an account? <a href="{% url 'login' %}">Login</a></p>
                
                <div class="divider">
                    <span>Instant Signup</span>
                </div>
                
               <div class="social-auth">
    <button type="button" class="social-btn google">
        <i class="fab fa-google"></i> Continue With Google
    </button>
    <button type="button" class="social-btn facebook">
        <i class="fab fa-facebook-f"></i> Continue With Facebook
    </button>
</div>
            </form>
        </div>
    </div>
</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password'? 'text' : 'password';
}

document.getElementById('register-form').addEventListener('submit', function(e) {
    const fullName = this.querySelector('[name="full_name"]');
    const email = this.querySelector('[name="email"]');
    const password = this.querySelector('[name="password"]');
    
    if (!fullName.value.trim()) {
        alert('Please enter Full Name');
        fullName.focus();
        e.preventDefault();
        return false;
    }
    
    if (!email.value.trim()) {
        alert('Please enter Email Id');
        email.focus();
        e.preventDefault();
        return false;
    }
    
    if (!password.value.trim()) {
        alert('Please enter Password');
        password.focus();
        e.preventDefault();
        return false;
    }
    
    if (password.value.length < 6) {
        alert('Password must be at least 6 characters');
        password.focus();
        e.preventDefault();
        return false;
    }
});
</script>
{% endblock %}
